@if (store.userRole() === 'CUSTOMER') {
  <div class="flex flex-col min-h-screen">
    <app-navbar></app-navbar>
    <div class="flex-grow">
      <router-outlet />
    </div>
    <app-footer></app-footer>
  </div>
} @else {
  <router-outlet />
}

<!-- Global Toast -->
@if (store.toast().visible) {
    <div 
      class="fixed bottom-8 right-8 z-[100] animate-slide-up"
      [ngClass]="{
        'bg-emerald-600': store.toast().type === 'success',
        'bg-red-600': store.toast().type === 'error',
        'bg-slate-800': store.toast().type === 'info'
      }"
    >
      <div class="px-6 py-4 rounded-2xl shadow-2xl text-white flex items-center gap-3 min-w-[300px]">
        <mat-icon>{{ store.toast().type === 'success' ? 'check_circle' : 'info' }}</mat-icon>
        <span class="font-medium">{{ store.toast().message }}</span>
      </div>
    </div>
  }
